# Rolfing Web Project - Configuration File
# Actualiza estos valores con tus datos

# ===================================
# INFORMACIÓN DEL NEGOCIO
# ===================================

# Nombre de la empresa
business.name=Rolfing Terapia

# Descripción
business.description=Servicios profesionales de terapia muscular y Rolfing

# Ubicación
business.location=Calle Principal #123, Ciudad, Estado 12345
business.country=País

# ===================================
# DATOS DE CONTACTO
# ===================================

# Teléfono principal
contact.phone1=+1 (234) 567-8900

# Teléfono secundario
contact.phone2=+0 (987) 654-3210

# Email principal
contact.email=info@rolfing.com

# Email de citas
contact.email.bookings=citas@rolfing.com

# ===================================
# REDES SOCIALES
# ===================================

# Facebook
social.facebook=https://facebook.com/rolfing

# Twitter
social.twitter=https://twitter.com/rolfing

# Instagram
social.instagram=https://instagram.com/rolfing

# YouTube
social.youtube=https://youtube.com/@rolfing

# ===================================
# CONFIGURACIÓN WEB
# ===================================

# Título del sitio
web.title=Rolfing - Terapia Muscular Integral

# Meta descripción
web.description=Descubre los beneficios del Rolfing, terapia muscular profesional para alivio del dolor y mejora postural.

# URL del sitio
web.url=http://localhost:8080/rolfing

# Puerto (desarrollo)
web.port=8080

# ===================================
# VIDEOS YOUTUBE
# ===================================

# Video 1: żQué es Rolfing? Parte 1
video.intro1=dQw4w9WgXcQ

# Video 2: Técnicas de Rolfing
video.intro2=jNQXAC9IVRw

# Video 3: Testimonio 1
video.testimonial1=9bZkp7q19f0

# Video 4: Testimonio 2
video.testimonial2=OPf0YbXqDm0

# ===================================
# CONFIGURACIÓN DE PRECIOS
# ===================================

# Sesión individual - mínimo
pricing.individual.min=80

# Sesión individual - máximo
pricing.individual.max=120

# Paquete 10 sesiones - mínimo
pricing.package.min=800

# Paquete 10 sesiones - máximo
pricing.package.max=900

# Rolfing deportivo - mínimo
pricing.sports.min=120

# Rolfing deportivo - máximo
pricing.sports.max=150

# Sesión grupal - mínimo
pricing.group.min=30

# Sesión grupal - máximo
pricing.group.max=50

# ===================================
# CONFIGURACIÓN DE EMAIL
# ===================================

# Servidor SMTP (para enviar emails)
email.smtp.host=smtp.gmail.com
email.smtp.port=587
email.smtp.user=tu-email@gmail.com
email.smtp.password=tu-contraseńa

# Habilitar email
email.enabled=false

# ===================================
# CONFIGURACIÓN DE BASE DE DATOS
# ===================================

# URL JDBC
db.url=jdbc:mysql://localhost:3306/rolfing_db

# Usuario
db.user=root

# Contraseńa
db.password=

# Driver
db.driver=com.mysql.cj.jdbc.Driver

# Habilitar BD
db.enabled=false

# ===================================
# CONFIGURACIÓN DE SEGURIDAD
# ===================================

# Modo producción
app.production=false

# Habilitar HTTPS
app.https=false

# Habilitar CORS
app.cors.enabled=true

# ===================================
# CONFIGURACIÓN DE LOGGING
# ===================================

# Nivel de log (DEBUG, INFO, WARN, ERROR)
logging.level=INFO

# Archivo de log
logging.file=logs/rolfing.log

# Tamańo máximo de archivo
logging.max.filesize=10MB

# ===================================
# CONFIGURACIÓN DE CACHÉ
# ===================================

# Caché habilitada
cache.enabled=true

# Tiempo de expiración (minutos)
cache.expiration=60

# ===================================
# HORARIO DE ATENCIÓN
# ===================================

# Lunes a Viernes
business.hours.weekday=9:00 AM - 6:00 PM

# Sábado
business.hours.saturday=10:00 AM - 4:00 PM

# Domingo
business.hours.sunday=Cerrado

# ===================================
# INFORMACIÓN LEGAL
# ===================================

# Nombre del propietario
legal.owner=Rolfing Terapia

# Licencia
legal.license=Licencia Professional de Rolfing

# Ańo de inicio
legal.founded.year=2026
